<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chat Widget Demo</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 24px; background: #f7f7f7; color: #222; }
        .panel { background: #fff; padding: 16px; border-radius: 10px; margin-bottom: 16px; box-shadow: 0 1px 5px rgba(0,0,0,.08); max-width: 420px; }
        label { display: block; font-size: 13px; margin-bottom: 4px; }
        input, button { padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        input { width: 100%; margin-bottom: 10px; box-sizing: border-box; }
        button { background: #4f46e5; color: #fff; cursor: pointer; border: none; padding: 8px 16px; font-weight: 600; border-radius: 6px; }
        #status { font-size: 13px; margin-top: 8px; color: #444; }
    </style>
</head>
<body>
    <h1>Dream Room Decore &mdash; Chat Widget Demo</h1>

    <div class="panel">
        <h3>Dev Login</h3>
        <p style="font-size:13px;color:#666;">
            Sign in to test the AI shopping assistant. Use a seeded account, e.g.
            <code>customer@dreamroom.test</code> / <code>Password123</code>.
        </p>
        <label for="email">Email</label>
        <input id="email" type="email" value="customer@dreamroom.test">
        <label for="password">Password</label>
        <input id="password" type="password" value="Password123">
        <button type="button" onclick="login()">Sign In</button>
        <div id="status"></div>
    </div>

    <p>Open the chat bubble in the bottom-right corner to talk to the AI shopping assistant.</p>

    <script>
        async function login() {
            const status = document.getElementById('status');
            status.textContent = 'Signing in...';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });

                const data = await response.json().catch(() => null);

                if (!response.ok) {
                    status.textContent = (data && data.title) || 'Login failed.';
                    return;
                }

                localStorage.setItem('accessToken', data.token);
                localStorage.setItem('refreshToken', data.refreshToken);
                status.textContent = 'Signed in as ' + data.email + '. Open the chat bubble to start.';
            } catch (error) {
                status.textContent = 'Login failed: ' + error.message;
            }
        }
    </script>
    <script src="/chat-widget.js"></script>
</body>
</html>
